<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị - Ngoại Ngữ OYin</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/static/js/modal.js"></script>
    <script src="/static/js/dashboard_modal.js"></script>
    <style>
        .sidebar-nav a[href="/admin/courses"] {
            background: rgba(255, 215, 0, 0.1);
            border-left-color: #ffd700;
        }

        .sidebar-nav a[href="/admin/courses"]:hover {
            background: rgba(255, 215, 0, 0.2);
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>🎯 OYin Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#nav" class="active" data-tab="nav">
                    <i class="fas fa-bars"></i> Thanh Nav
                </a>
                <a href="#slides" data-tab="slides">
                    <i class="fas fa-images"></i> Ảnh Slider
                </a>
                <a href="#categories" data-tab="categories">
                    <i class="fas fa-tags"></i> Danh mục
                </a>
                <a href="#courses" data-tab="courses">
                    <i class="fas fa-book"></i> Khóa học
                </a>
                <a href="#documents" data-tab="documents">
                    <i class="fas fa-file-alt"></i> Tài liệu
                </a>
                <a href="#news" data-tab="news">
                    <i class="fas fa-newspaper"></i> Tin tức
                </a>
                <a href="#reviews" data-tab="reviews">
                    <i class="fas fa-star"></i> Đánh giá
                </a>
                <a href="#" onclick="window.dashboardModal.open(); return false;"
                    style="border-top:1px solid rgba(255,255,255,0.1);margin-top:10px;color:#ffd700;">
                    <i class="fas fa-chart-pie"></i> 📊 Xem tất cả
                </a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h1 id="pageTitle">📋 Quản lý thanh Navigation</h1>
            </header>
            <div class="admin-content" id="tabContent">
                <div id="loading">Đang tải...</div>
            </div>
        </main>
    </div>

    <!-- Nút nổi tạo khóa học -->
    <a href="/admin/courses" style="
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: linear-gradient(135deg, #e67e22, #d35400);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 14px 28px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 30px rgba(230,126,34,0.4);
        z-index: 999;
        transition: all 0.3s;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 10px;
    " onmouseenter="this.style.transform='scale(1.05)';this.style.boxShadow='0 12px 40px rgba(230,126,34,0.5)'"
        onmouseleave="this.style.transform='scale(1)';this.style.boxShadow='0 8px 30px rgba(230,126,34,0.4)'">
        <i class="fas fa-plus-circle"></i> Tạo khóa học mới
    </a>

    <script src="/static/js/admin.js"></script>
</body>

</html>
